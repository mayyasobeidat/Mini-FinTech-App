<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>كشف الحساب العائلي</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    :root { 
        --pos-bg: #eefdf3; --pos-color: #117336; 
        --neg-bg: #fff5f5; --neg-color: #b91c1c; 
        --primary-blue: #1a73e8; 
    }

    /* 1. ضبط الجسم ليكون حاوية مرنة بارتفاع الشاشة تماماً */
    html, body {
        height: 100vh;
        height: 100dvh;
        margin: 0;
        padding: 0;
        overflow: hidden; /* يمنع السكرول الخارجي */
        display: flex;
        flex-direction: column;
        background-color: #f8f9fa;
        font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    /* 2. الهيدر (ارتفاع ثابت) */
    .header-section { 
        background-color: white; 
        color: var(--primary-blue); 
        padding: 10px 0; 
        border-bottom: 1px solid #eee;
        height: 70px; 
        flex-shrink: 0; /* يمنعه من الانكماش */
    }
    .header-section h4 { font-weight: 800; margin-bottom: 2px; font-size: 1.2rem; }

    /* 3. منطقة التبويبات (ارتفاع ثابت) */
    .nav-tabs-wrapper {
        background: #f8f9fa; 
        padding: 8px 0;
        height: 80px; 
        flex-shrink: 0;
    }
    .nav-pills { 
        overflow-x: auto; 
        display: flex; 
        flex-wrap: nowrap; 
        padding: 5px 10px;
        scrollbar-width: none;
        justify-content: safe center; 
    }
    .nav-pills::-webkit-scrollbar { display: none; }

    .nav-link { 
        border-radius: 15px !important; 
        margin: 0 5px; 
        background: white; 
        color: #666; 
        border: 1px solid #e0e0e0; 
        display: flex; 
        flex-direction: column; 
        align-items: center;
        min-width: 90px; 
        padding: 6px 12px !important;
    }
    .nav-link.active { background-color: var(--primary-blue) !important; color: white !important; }

    /* 4. الحاوية الرئيسية (تأخذ كل ما تبقى من مساحة) */
    .main-container {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        padding: 10px;
        overflow: hidden;
    }

    .tab-content, .tab-pane { 
        height: 100%; 
        display: flex;
        flex-direction: column;
    }

    /* 5. الكارت (مرن ويحتوي العناصر داخله) */
    .account-card {
        display: flex;
        flex-direction: column;
        height: 100%;
        background: white;
        border-radius: 24px;
        border: 1px solid #f0f0f0;
        box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        max-width: 600px;
        margin: 0 auto;
        width: 100%;
        overflow: hidden;
    }

    .summary-box { padding: 15px; text-align: center; flex-shrink: 0; }
    .status-pos { background-color: var(--pos-bg); color: var(--pos-color); }
    .status-neg { background-color: var(--neg-bg); color: var(--neg-color); }
    .balance-val { font-size: 2rem; font-weight: 900; display: block; line-height: 1; }

    /* 6. منطقة السكرول (هنا يتم التمرير فقط) */
    .items-scroll-area { 
        flex-grow: 1;
        overflow-y: auto; 
        background: #fff;
        -webkit-overflow-scrolling: touch;
    }

    /* 7. الباجينيشن (ثابت في الأسفل) */
    .pagination-bar { 
        background: #fcfcfc; 
        padding: 12px 20px; 
        border-top: 1px solid #eee; 
        flex-shrink: 0;
    }

    /* عناصر القائمة */
    .transaction-item { padding: 12px 15px; border-bottom: 1px solid #f8f9fa; display: flex; align-items: center; min-height: 65px; }
    .icon-box { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-left: 12px; flex-shrink: 0; }
    .icon-med { background: #eff6ff; color: #2563eb; }
    .icon-dep { background: #f0fdf4; color: #16a34a; }
    .item-title { font-weight: 700; font-size: 0.85rem; color: #1f2937; display: block; text-align: right; }
    .item-date { font-size: 0.7rem; color: #9ca3af; display: block; text-align: right; }
    .amount-tag { font-weight: 800; font-size: 1rem; }
    
    .text-pos { color: #16a34a; }
    .text-neg { color: #dc3545; }
    .nav-link.active .text-pos, .nav-link.active .text-neg { color: white; }
</style>
</head>
<body>

  <div class="header-section text-center">
    <h4>كشف الحساب العائلي</h4>
    <p class="small mb-0 text-muted">متابعة أرصدة أدوية الوالد</p>
  </div>

  <div class="nav-tabs-wrapper">
    <ul class="nav nav-pills" id="pills-tab" role="tablist">
      </ul>
  </div>

  <div class="main-container">
    <div class="tab-content" id="pills-tabContent">
      <div class="text-center p-5" id="loader">
        <div class="spinner-border text-primary"></div>
        <p class="mt-3 text-muted fw-500">جاري تحميل البيانات...</p>
      </div>
      </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>

</body>
</html>

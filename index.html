<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>كشف الحساب العائلي</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
 :root { 
    --pos-bg: #eefdf3; --pos-color: #117336; 
    --neg-bg: #fff5f5; --neg-color: #b91c1c; 
    --primary-blue: #1a73e8; 
}

/* 1. تثبيت طول الصفحة ومنع السكرول الخارجي */
html, body {
    height: 100vh;
    height: 100dvh; /* الحل السحري للموبايل لضمان عدم اختفاء الباجينيشن تحت شريط العناوين */
    display: flex;
    flex-direction: column;
    overflow: hidden; 
    margin: 0;
    background-color: #f8f9fa;
    font-family: 'Segoe UI', Tahoma, sans-serif;
}

/* 2. الهيدر والتبويبات ثابتة (لا تتمدد ولا تتقلص) */
.header-section { 
    background-color: white; color: var(--primary-blue); 
    padding: 10px 0; border-bottom: 1px solid #eee;
    height: 70px; flex-shrink: 0;
}

.nav-tabs-wrapper {
    background: #f8f9fa; padding: 8px 0;
    height: 75px; flex-shrink: 0;
}

/* 3. الحاوية الرئيسية تأخذ المساحة المتبقية */
.main-container {
    flex-grow: 1; 
    display: flex;
    flex-direction: column;
    overflow: hidden; 
    padding: 10px;
}

/* 4. الكارت لازم يكون مرن ويحترم حدود الشاشة */
.account-card {
    display: flex;
    flex-direction: column;
    height: 100%; 
    max-height: 100%; 
    overflow: hidden;
    background: white; 
    border-radius: 24px; 
    border: 1px solid #f0f0f0; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
    max-width: 600px; 
    margin: auto; 
    width: 100%;
}

/* 5. منطقة اللوجز هي الوحيدة التي تسحب المساحة وتسمح بالسكرول */
.items-scroll-area { 
    flex-grow: 1; 
    overflow-y: auto; 
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
    -webkit-overflow-scrolling: touch; /* سكرول ناعم للايفون */
}

/* 6. الباجينيشن ثابت دائماً في أسفل الكارت */
.pagination-bar { 
    background: #fcfcfc; 
    padding: 10px 20px; 
    border-top: 1px solid #eee; 
    flex-shrink: 0; /* يمنع اختفاء الشريط */
}

/* تنسيق السكرول */
.items-scroll-area::-webkit-scrollbar { width: 6px; }
.items-scroll-area::-webkit-scrollbar-thumb { background-color: #e0e0e0; border-radius: 10px; }
  </style>
</head>
<body>

  <div class="header-section text-center">
    <h4>كشف الحساب العائلي</h4>
    <p class="small mb-0 text-muted">متابعة أرصدة أدوية الوالد</p>
  </div>

  <div class="nav-tabs-wrapper">
    <ul class="nav nav-pills" id="pills-tab" role="tablist">
      </ul>
  </div>

  <div class="main-container">
    <div class="tab-content" id="pills-tabContent">
      <div class="text-center p-5" id="loader">
        <div class="spinner-border text-primary"></div>
        <p class="mt-3 text-muted fw-500">جاري تحميل البيانات...</p>
      </div>
      </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>كشف الحساب العائلي</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    
    :root { 
      --pos-bg: #eefdf3; --pos-color: #117336; 
      --neg-bg: #fff5f5; --neg-color: #b91c1c; 
      --primary-blue: #1a73e8; 
    }

    html, body { 
     height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden; /* لمنع السكرول الخارجي المزعج */
  margin: 0;
    }
    
    .header-section { 
      background-color: white; color: var(--primary-blue); 
      padding: 10px 0; border-bottom: 1px solid #eee;
      height: 70px; flex-shrink: 0;
    }
    .header-section h4 { font-weight: 800; margin-bottom: 2px; font-size: 1.2rem; }
    
    .nav-tabs-wrapper {
      background: #f8f9fa; padding: 8px 0;
      height: 75px; flex-shrink: 0;
    }
   .nav-pills { 
      overflow-x: auto; 
      display: flex; 
      flex-wrap: nowrap; 
      padding: 10px;
      scrollbar-width: none;
      /* هذا السطر يضمن التوسيط إذا كانت العناصر أقل من عرض الشاشة */
      justify-content: safe center; 
    }
    
    .nav-item {
      /* لضمان عدم التصاق العناصر ببعضها عند التوسيط */
      display: inline-block;
    }
    .nav-pills::-webkit-scrollbar { display: none; }
    
    .nav-link { 
      border-radius: 15px !important; margin-left: 10px; background: white; 
      color: #666; border: 1px solid #e0e0e0; 
      display: flex; flex-direction: column; align-items: center;
      min-width: 90px; padding: 6px 12px !important;
    }
    .nav-link.active { background-color: var(--primary-blue) !important; color: white !important; }

    .tab-name { font-weight: 700; font-size: 0.85rem; }
    .tab-balance { font-size: 0.65rem; font-weight: 800; margin-top: 2px; }
    .text-pos { color: #16a34a; }
    .text-neg { color: #dc3545; }
    .nav-link.active .text-pos, .nav-link.active .text-neg { color: rgba(255,255,255,0.95); }

    .main-container {
flex-grow: 1; 
  overflow: hidden; /* لمنع تمدد الحاوية لأسفل */
  display: flex;
  flex-direction: column;
  padding: 10px;
    }

.account-card {
  display: flex;
  flex-direction: column;
  height: 100%; /* سيأخذ طول الـ main-container بالضبط */
  max-height: 100%;
  background: white;
  border-radius: 24px;
  overflow: hidden;
}

    .summary-box { padding: 15px 20px; text-align: center; flex-shrink: 0; }
    .status-pos { background-color: var(--pos-bg); color: var(--pos-color); }
    .status-neg { background-color: var(--neg-bg); color: var(--neg-color); }
    .balance-val { font-size: 2rem; font-weight: 900; display: block; line-height: 1; }
    
    .items-scroll-area { 
flex-grow: 1; /* ستأخذ كل المساحة المتبقية داخل الكارت */
  overflow-y: auto; /* سيظهر السكرول هنا فقط عند الحاجة */
  background: #fff;
  border-bottom: 1px solid #f0f0f0;
    }
    /* لكي يبدو السكرول أنيقاً */
.items-scroll-area::-webkit-scrollbar {
  width: 6px;
}
.items-scroll-area::-webkit-scrollbar-thumb {
  background-color: #e0e0e0;
  border-radius: 10px;
}
    .transaction-item { padding: 12px 15px; border-bottom: 1px solid #f8f9fa; display: flex; align-items: center; }
    .icon-box { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-left: 12px; font-size: 1rem; flex-shrink: 0; }
    .icon-med { background: #eff6ff; color: #2563eb; }
    .icon-dep { background: #f0fdf4; color: #16a34a; }
    
    .item-title { font-weight: 700; font-size: 0.85rem; color: #1f2937; display: block; }
    .item-date { font-size: 0.7rem; color: #9ca3af; }
    .amount-tag { font-weight: 800; font-size: 0.95rem; }
    
    .pagination-bar { background: #fcfcfc; padding: 10px 20px; border-top: 1px solid #eee; flex-shrink: 0; }
    .tab-content, .tab-pane { height: 100%; }
  </style>
</head>
<body>

  <div class="header-section text-center">
    <h4>كشف الحساب العائلي</h4>
    <p class="small mb-0 text-muted">متابعة أرصدة أدوية الوالد</p>
  </div>

  <div class="nav-tabs-wrapper">
    <ul class="nav nav-pills" id="pills-tab" role="tablist">
      </ul>
  </div>

  <div class="main-container">
    <div class="tab-content" id="pills-tabContent">
      <div class="text-center p-5" id="loader">
        <div class="spinner-border text-primary"></div>
        <p class="mt-3 text-muted fw-500">جاري تحميل البيانات...</p>
      </div>
      </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>

</body>
</html>

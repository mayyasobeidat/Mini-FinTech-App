<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="apple-touch-icon" sizes="180x180" href="logo.jpg">
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link rel="shortcut icon" href="logo.jpg">

  <title>لوحة الإدارة - مياس</title>
  <style>
    body { background-color: #f8f9fa; padding: 20px; font-family: 'Segoe UI', sans-serif; }
    .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    .nav-pills .nav-link { cursor: pointer; font-weight: 600; }
    .exception-row { transition: all 0.3s; }
    .exception-row:hover { background-color: #f1f3f5; }
    .form-check-input:checked + .form-check-label { font-weight: bold; color: #0d6efd; }
  </style>
</head>
<body class="p-3">
  <div class="container card shadow-sm p-4">
    
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 text-primary fw-bold">لوحة تحكم الإدارة</h5>
        <a href="index.html" class="btn btn-sm btn-outline-secondary d-flex align-items-center" style="border-radius: 10px; font-size: 0.8rem;">
            <i class="bi bi-arrow-right-short fs-5"></i> 
            <span>رجوع للأرصدة</span>
        </a>
    </div>
    
    <hr class="mt-0 mb-4 opacity-50">

    <ul class="nav nav-pills nav-fill mb-4">
      <li class="nav-item">
        <a class="nav-link active" id="buy-tab" onclick="showForm('buy')">شراء دواء</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" id="dep-tab" onclick="showForm('dep')">إيداع رصيد</a>
      </li>
    </ul>

    <div id="buy-form">
      <h5 class="mb-3 small fw-bold text-muted">تسجيل فاتورة دواء</h5>
      <div class="mb-3">
        <label class="form-label">تاريخ العملية</label>
        <input type="date" id="medDate" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">اسم الدواء</label>
        <input type="text" id="medName" class="form-control" placeholder="مثلاً: جلادياس">
      </div>
      <div class="mb-3">
        <label class="form-label">المبلغ الإجمالي</label>
        <input type="number" id="totalAmount" class="form-control" step="0.01">
      </div>

      <div class="mb-3 border p-3 rounded bg-light">
        <label class="form-label fw-bold text-primary"><i class="bi bi-people-fill me-1"></i>تخصيص مبالغ المستثنيين (اختياري)</label>
        <div id="exceptions-list" class="mt-2"></div>
        <hr>
        <small class="text-muted d-block mt-2">
          * فعل خيار الاسم وأدخل المبلغ الذي دفعه فقط.<br>
          * باقي الفاتورة سيتم توزيعه بالتساوي على غير المختارين.
        </small>
      </div>

      <button class="btn btn-primary w-100 py-2 fw-bold" onclick="submitMedicine()">تسجيل وتوزيع الفاتورة</button>
    </div>

    <div id="dep-form" style="display:none;">
      <h5 class="mb-3 small fw-bold text-muted">تسجيل إيداع (تحويل مالي)</h5>
      <div class="mb-3">
        <label class="form-label">تاريخ الحوالة</label>
        <input type="date" id="depDate" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">اسم الشخص</label>
        <select id="brotherName" class="form-select">
          <option value="محمد">محمد</option>
          <option value="سماح">سماح</option>
          <option value="نصر">نصر</option>
          <option value="عبدالله">عبدالله</option>
          <option value="محمود">محمود</option>
          <option value="عبود">عبود</option>
          <option value="مياس">مياس</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">المبلغ المودع</label>
        <input type="number" id="depAmount" class="form-control" placeholder="مثلاً: 6">
      </div>
      <button class="btn btn-success w-100 py-2 fw-bold" onclick="submitDeposit()">حفظ الإيداع</button>
    </div>

    <div id="status" class="mt-3 text-center small"></div>
  </div>
  
<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwWAba6enDEezMqjUl0ZIev43PcjjX5K4QIJh8rpwRMOuaSq44IktL2IiTulKvnd-teFw/exec';
    const brothers = ["محمد", "سماح", "نصر", "عبدالله", "محمود", "عبود", "مياس"];

    window.onload = function () {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('medDate').value = today;
        document.getElementById('depDate').value = today;

        const listDiv = document.getElementById('exceptions-list');
        listDiv.innerHTML = "";
        brothers.forEach(name => {
            listDiv.innerHTML += `
        <div class="d-flex align-items-center mb-2 p-1 rounded exception-row">
          <div class="form-check flex-grow-1">
            <input class="form-check-input exception-check" type="checkbox" value="${name}" id="check-${name}" onchange="toggleInput('${name}')">
            <label class="form-check-label" for="check-${name}">${name}</label>
          </div>
          <input type="number" class="form-control form-control-sm w-25 exception-amount" id="input-${name}" placeholder="0.00" disabled>
        </div>`;
        });
    };

    function toggleInput(name) {
        const isChecked = document.getElementById('check-' + name).checked;
        const input = document.getElementById('input-' + name);
        input.disabled = !isChecked;
        if (!isChecked) input.value = "";
    }

    function showForm(type) {
        document.getElementById('buy-form').style.display = type === 'buy' ? 'block' : 'none';
        document.getElementById('dep-form').style.display = type === 'dep' ? 'block' : 'none';
        document.getElementById('status').innerText = "";
        document.getElementById('buy-tab').classList.toggle('active', type === 'buy');
        document.getElementById('dep-tab').classList.toggle('active', type === 'dep');
    }

    async function sendToGoogle(action, payload) {
        const status = document.getElementById('status');
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: action, data: payload })
            });

            status.className = "mt-3 text-center text-success fw-bold";
            status.innerText = "✅ تمت العملية بنجاح (سيظهر التحديث خلال لحظات)";
            return true;
        } catch (error) {
            console.error(error);
            status.className = "mt-3 text-center text-danger fw-bold";
            status.innerText = "❌ حدث خطأ في الاتصال بالسيرفر";
            return false;
        }
    }

async function submitMedicine() {
    const btn = document.querySelector('#buy-form button');
    const status = document.getElementById('status');
    
    let exceptions = [];
    document.querySelectorAll('.exception-check:checked').forEach(check => {
        const name = check.value;
        const amount = parseFloat(document.getElementById('input-' + name).value) || 0;
        exceptions.push({ name: name, paid: amount });
    });

    const totalAmount = parseFloat(document.getElementById('totalAmount').value);
    const medName = document.getElementById('medName').value;

    if(!medName || isNaN(totalAmount)) {
        status.innerHTML = "<span class='text-danger'>⚠️ يرجى تعبئة اسم الدواء والمبلغ الإجمالي</span>";
        return;
    }

    const brothersCount = 7; 
    const totalPaidByExceptions = exceptions.reduce((sum, ex) => sum + ex.paid, 0);
    const remainingAmount = totalAmount - totalPaidByExceptions;
    const normalPeopleCount = brothersCount - exceptions.length;
    const sharePerNormal = normalPeopleCount > 0 ? (remainingAmount / normalPeopleCount) : 0;

    btn.disabled = true;
    status.innerHTML = "⏳ جاري الحفظ...";

    const success = await sendToGoogle('recordMedicine', {
        date: document.getElementById('medDate').value,
        medName: medName,
        totalAmount: totalAmount,
        exceptions: exceptions 
    });

    if(success) {
        let resultMsg = `✅ تم التسجيل: <b>${medName}</b> بقيمة <b>${totalAmount}</b> د.أ<br>`;
        resultMsg += `🔹 حصة الفرد (غير المستثنى): <span class='text-primary'>${sharePerNormal.toFixed(2)} د.أ</span><br>`;
        if(exceptions.length > 0) {
            resultMsg += `🔸 المستثنيين: ` + exceptions.map(ex => `${ex.name} (${ex.paid} د.أ)`).join(" - ");
        }
        
        status.className = "mt-3 p-2 border rounded bg-light small text-end";
        status.innerHTML = resultMsg;

        document.getElementById('medName').value = "";
        document.getElementById('totalAmount').value = "";
        document.querySelectorAll('.exception-check').forEach(c => c.checked = false);
        document.querySelectorAll('.exception-amount').forEach(i => { i.value = ""; i.disabled = true; });
    }
    btn.disabled = false;
}


async function submitDeposit() {
    const btn = document.querySelector('#dep-form button');
    const status = document.getElementById('status');
    
    const name = document.getElementById('brotherName').value;
    const amount = document.getElementById('depAmount').value;

    if(!amount) {
        status.innerHTML = "<span class='text-danger'>⚠️ يرجى إدخال المبلغ</span>";
        return;
    }

    btn.disabled = true;
    status.innerHTML = "⏳ جاري الحفظ...";

    const success = await sendToGoogle('recordDeposit', {
        date: document.getElementById('depDate').value,
        name: name,
        amount: amount
    });

    if(success) {
        status.className = "mt-3 p-2 border rounded bg-light text-success fw-bold text-center";
        status.innerHTML = `✅ تم إيداع مبلغ <b>${amount}</b> د.أ في رصيد <b>${name}</b>`;
        document.getElementById('depAmount').value = "";
    }
    btn.disabled = false;
}



</script>

</body>
</html>
